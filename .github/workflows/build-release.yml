name: Build and Release

on:
  push:
    tags:
      - 'adl-lsp-*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (e.g., adl-lsp-0.8.3)'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_name: adl-lsp-linux-x64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact_name: adl-lsp-macos-x64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact_name: adl-lsp-macos-arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: 1.85.1
          targets: ${{ matrix.target }}

      - name: Install target
        run: rustup target add ${{ matrix.target }}

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build binary
        run: |
          cd rust/adl-lsp
          cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_DIR: ${{ github.workspace }}/rust/adl-lsp/target

      - name: Prepare binary for release
        run: |
          cd rust/adl-lsp
          cp target/${{ matrix.target }}/release/adl-lsp ${{ matrix.artifact_name }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: rust/adl-lsp/${{ matrix.artifact_name }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: extract_version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            # Extract version from git tag (e.g., adl-lsp-0.8.2 -> 0.8.2)
            VERSION=${GITHUB_REF#refs/tags/adl-lsp-}
          else
            # Use version from workflow_dispatch input
            VERSION=${{ github.event.inputs.release_tag }}
            # Remove the adl-lsp- prefix if it exists
            VERSION=${VERSION#adl-lsp-}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION"
          echo "Full input: ${{ github.event.inputs.release_tag }}"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List downloaded artifacts
        run: |
          echo "Contents of artifacts directory:"
          ls -la artifacts/
          echo "Contents of each artifact subdirectory:"
          for dir in artifacts/*/; do
            if [ -d "$dir" ]; then
              echo "--- $dir ---"
              ls -la "$dir"
            fi
          done

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'push' && github.ref_name || github.event.inputs.release_tag }}
          name: "adl-lsp ${{ steps.extract_version.outputs.version }}"
          files: artifacts/**/*
          generate_release_notes: false
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
